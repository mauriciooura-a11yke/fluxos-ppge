<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPGE | Flows Dinâmico</title>
    <style>
        /* MANTIVE SEUS ESTILOS ORIGINAIS AQUI */
        :root {
            --bg-dark: #0a0f18; --card-bg: #161d29; --border: #2d3748;
            --accent: #38bdf8; --text-bright: #e2e8f0; --text-dim: #94a3b8;
            --tag-systems: #8b5cf6; --tag-norms: #f59e0b; --tag-flow: #10b981;
            --tag-proc: #f43f5e; --sidebar-width: 260px;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-bright); margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: #0d131f; border-right: 1px solid var(--border); height: 100vh; position: fixed; padding: 30px 20px; box-sizing: border-box; }
        .sidebar-link { color: var(--text-bright); text-decoration: none; padding: 12px 15px; border-radius: 8px; display: block; cursor: pointer; transition: 0.3s; margin-bottom: 5px; }
        .sidebar-link.active { background: rgba(56, 189, 248, 0.15); color: var(--accent); font-weight: bold; }
        .main-wrapper { margin-left: var(--sidebar-width); flex: 1; padding: 20px 40px; }
        .section-block { margin-bottom: 50px; }
        .section-title { color: var(--accent); text-transform: uppercase; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; transition: 0.2s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .category-tag { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; margin-bottom: 10px; display: inline-block; }
        .btn-view { background: rgba(56, 189, 248, 0.08); color: var(--accent); text-decoration: none; text-align: center; padding: 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; border: 1px solid var(--accent); }
        #searchInput { width: 100%; padding: 14px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 40px; }
        @media (max-width: 900px) { .sidebar { display: none; } .main-wrapper { margin-left: 0; } }
    </style>
</head>
<body>

<nav class="sidebar">
    <div style="color: var(--text-dim); font-size: 0.7rem; margin-bottom: 20px;">MENU</div>
    <a onclick="setCategory('all')" id="btn-all" class="sidebar-link active">🏠 Tudo</a>
    <a onclick="setCategory('fluxo')" id="btn-fluxo" class="sidebar-link">🌊 Fluxos</a>
    <a onclick="setCategory('sistema')" id="btn-sistema" class="sidebar-link">💻 Sistemas</a>
    <a onclick="setCategory('normativo')" id="btn-normativo" class="sidebar-link">📜 Normativos</a>
    <a onclick="setCategory('processo')" id="btn-processo" class="sidebar-link">📁 Processos</a>
</nav>

<div class="main-wrapper">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1 style="font-size: 1.4rem;">PPGE<span>Flows</span></h1>
        <div id="status-load" style="font-size: 0.7rem; color: var(--tag-flow);">● Dados Atualizados</div>
    </header>

    <input type="text" id="searchInput" onkeyup="filter()" placeholder="Pesquisar...">

    <div id="content-area">
        </div>
</div>

<script>
    // Configuração das seções
    const secoes = [
        { id: 'fluxo', titulo: 'Fluxos', arquivo: 'fluxos.json', tagClass: 'tag-flow' },
        { id: 'sistema', titulo: 'Sistemas', arquivo: 'sistemas.json', tagClass: 'tag-system' },
        { id: 'normativo', titulo: 'Normativos', arquivo: 'normativos.json', tagClass: 'tag-norm' },
        { id: 'processo', titulo: 'Processos', arquivo: 'processos.json', tagClass: 'tag-proc' }
    ];

    let currentCategory = 'all';

    // Função para carregar os JSONs
    async function carregarDados() {
        const container = document.getElementById('content-area');
        container.innerHTML = '';

        for (const sec of secoes) {
            try {
                // Busca o arquivo JSON (pode ser 'data/fluxos.json' se você criar a pasta)
                const response = await fetch(sec.arquivo);
                const dados = await response.json();

                // Cria o bloco da seção
                const sectionHtml = `
                    <div class="section-block" id="sec-${sec.id}">
                        <h2 class="section-title">${sec.titulo}</h2>
                        <div class="grid-container" id="grid-${sec.id}">
                            ${dados.map(item => `
                                <div class="card">
                                    <div>
                                        <span class="category-tag ${sec.tagClass}">${sec.titulo.slice(0,-1)}</span>
                                        <h3>${item.titulo}</h3>
                                        <p>${item.descricao}</p>
                                    </div>
                                    <a href="${item.link}" class="btn-view" target="_blank">${item.botao || 'VISUALIZAR'}</a>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.innerHTML += sectionHtml;
            } catch (e) {
                console.error("Erro ao carregar " + sec.arquivo, e);
            }
        }
        filter(); // Aplica filtros iniciais
    }

    function setCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
        document.getElementById('btn-' + cat).classList.add('active');
        filter();
    }

    function filter() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.section-block').forEach(section => {
            const sectionId = section.id.replace('sec-', '');
            const cards = section.querySelectorAll('.card');
            let hasMatch = false;

            if (currentCategory === 'all' || currentCategory === sectionId) {
                cards.forEach(card => {
                    const match = card.innerText.toLowerCase().includes(val);
                    card.style.display = match ? "" : "none";
                    if (match) hasMatch = true;
                });
                section.style.display = hasMatch ? "" : "none";
            } else {
                section.style.display = "none";
            }
        });
    }

    // Inicia o carregamento ao abrir a página
    carregarDados();
</script>
</body>
</html>
