<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Fluxos PPGs | EFLCH</title>
    <style>
        :root {
            --bg-dark: #0a0f18;
            --card-bg: #161d29;
            --border: #2d3748;
            --accent: #38bdf8;
            --text-bright: #e2e8f0;
            --text-dim: #94a3b8;
            --tag-systems: #8b5cf6;
            --tag-norms: #f59e0b;
            --tag-flow: #10b981;
            --tag-proc: #3b82f6;
            --sidebar-width: 280px;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-bright);
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- MENU LATERAL --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #0d131f;
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        /* Overlay para Mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
        }

        .btn-reset-all {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.2s;
            text-align: center;
        }
        .btn-reset-all:hover { background: var(--accent); color: var(--bg-dark); }

        .sidebar-title {
            color: var(--text-dim);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 15px 0 10px;
            padding-left: 5px;
        }

        .ppg-selector {
            width: 100%;
            padding: 10px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-bright);
            font-size: 0.9rem;
            margin-bottom: 20px;
            outline: none;
        }

        .sidebar-link {
            color: var(--text-bright);
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: 0.2s;
            cursor: pointer;
            margin-bottom: 4px;
            display: block;
        }
        .sidebar-link.active {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent);
            font-weight: 600;
        }

        /* --- BOTÃO HAMBÚRGUER --- */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0;
            margin-right: 15px;
        }

        /* --- CONTEÚDO CENTRAL --- */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 20px 40px;
            box-sizing: border-box;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .brand-container { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 40px; width: auto; display: none; } 
        .brand h1 { font-size: 1.2rem; margin: 0; white-space: nowrap; }
        .brand h1 span { color: var(--accent); }

        #searchInput {
            width: 100%;
            padding: 15px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
        }

        .active-filters-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 30px;
            align-items: center;
            min-height: 40px;
        }
        .filter-label { font-size: 0.8rem; font-weight: 700; color: var(--accent); }
        .filter-badge {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            display: flex; align-items: center; gap: 8px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            display: flex; flex-direction: column;
        }

        .keyword-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 15px; }
        .keyword-tag { font-size: 0.6rem; color: var(--text-dim); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; }

        .btn-view {
            text-decoration: none; text-align: center; padding: 12px; border-radius: 8px;
            font-size: 0.75rem; font-weight: 700; border: 1px solid; margin-top: 20px;
        }

        /* --- RESPONSIVIDADE (MOBILE) --- */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-overlay.visible {
                display: block;
            }
            .main-wrapper {
                margin-left: 0;
                padding: 15px;
            }
            .menu-toggle {
                display: block;
            }
            header {
                justify-content: flex-start;
            }
            .brand h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div id="overlay" class="sidebar-overlay" onclick="toggleMenu()"></div>

<nav id="sidebar" class="sidebar">
    <button class="btn-reset-all" onclick="resetAllFilters(); toggleMenu();">🧹 Redefinir Filtros</button>

    <div class="sidebar-title">Selecione o PPG</div>
    <select id="ppgFilter" class="ppg-selector" onchange="filter(); maybeCloseMenu();">
        <option value="all">Todos os PPGs</option>
    </select>

    <div class="sidebar-title">Categorias</div>
    <a onclick="setCategory('all')" id="btn-all" class="sidebar-link active">🏠 Ver Tudo</a>
    <a onclick="setCategory('fluxo')" id="btn-fluxo" class="sidebar-link">🌊 Fluxos</a>
    <a onclick="setCategory('sistema')" id="btn-sistema" class="sidebar-link">💻 Sistemas</a>
    <a onclick="setCategory('normativo')" id="btn-normativo" class="sidebar-link">📜 Normativos</a>
    <a onclick="setCategory('processo')" id="btn-processo" class="sidebar-link">📁 Processos</a>
</nav>

<div class="main-wrapper">
    <header>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <div class="brand-container">
            <img id="mainLogo" class="logo-img" alt="Logo">
            <div class="brand">
                <h1>Portal do Conhecimento<span> | PPGs - EFLCH - UNIFESP</span></h1>
            </div>
        </div>
    </header>

    <input type="text" id="searchInput" onkeyup="filter()" placeholder="O que você procura?">
    
    <div id="activeFilters" class="active-filters-bar"></div>

    <div id="content-area"></div>

    <footer>&copy; 2026 UNIFESP | EFLCH</footer>
</div>

<script src="assets.js"></script>

<script>
    // --- CONTROLE DO MENU MOBILE ---
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('visible');
    }

    function maybeCloseMenu() {
        if (window.innerWidth <= 1024) toggleMenu();
    }

    window.onload = function() {
        const logoImg = document.getElementById('mainLogo');
        if (typeof LOGO_PPGE !== 'undefined' && LOGO_PPGE !== '') {
            logoImg.src = LOGO_PPGE;
            logoImg.style.display = 'block';
        }
    };

    const secoes = [
        { id: 'fluxo', titulo: 'Fluxos', arquivo: 'fluxos.json', tagClass: 'tag-flow' },
        { id: 'sistema', titulo: 'Sistemas', arquivo: 'sistemas.json', tagClass: 'tag-system' },
        { id: 'normativo', titulo: 'Normativos', arquivo: 'normativos.json', tagClass: 'tag-normative' },
        { id: 'processo', titulo: 'Processos', arquivo: 'processos.json', tagClass: 'tag-process' }
    ];

    let currentCategory = 'all';

    function getPPGColor(ppg) {
        const ppgLower = (ppg || '').toLowerCase();
        if (!ppg || ppgLower === 'geral' || ppgLower === 'todos') return '#94a3b8'; 
        const colors = ['#38bdf8', '#10b981', '#818cf8', '#fbbf24', '#2dd4bf', '#6366f1'];
        let hash = 0;
        for (let i = 0; i < ppg.length; i++) { hash = ppg.charCodeAt(i) + ((hash << 5) - hash); }
        return colors[Math.abs(hash) % colors.length];
    }

    function resetAllFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('ppgFilter').value = 'all';
        setCategory('all');
    }

    function updateFilterBadges() {
        const badgeContainer = document.getElementById('activeFilters');
        const ppg = document.getElementById('ppgFilter').value;
        const search = document.getElementById('searchInput').value;
        let badges = '';
        if (ppg !== 'all' || currentCategory !== 'all' || search !== '') {
            badges = '<span class="filter-label">Filtros aplicados -></span>';
            if (ppg !== 'all') badges += `<div class="filter-badge">PPG: <span>${ppg.toUpperCase()}</span></div>`;
            if (currentCategory !== 'all') badges += `<div class="filter-badge">Tipo: <span>${currentCategory.toUpperCase()}</span></div>`;
            if (search) badges += `<div class="filter-badge">Busca: <span>"${search}"</span></div>`;
        }
        badgeContainer.innerHTML = badges;
    }

    function renderCards(lista, tagClass, categoriaTitulo) {
        return lista.map(item => {
            const ppgOriginal = (item.ppg || 'Geral');
            const ppgCor = getPPGColor(ppgOriginal);
            const isProc = tagClass === 'tag-process';
            const corStatus = item.status === 'ativo' ? '#10b981' : '#64748b';

            let keywordsHtml = '';
            if (item.palavras_chave) {
                keywordsHtml = `<div class="keyword-container">
                    ${item.palavras_chave.split(',').map(tag => `<span class="keyword-tag">#${tag.trim()}</span>`).join('')}
                </div>`;
            }

            return `
                <div class="card" data-ppg="${ppgOriginal.toLowerCase()}" style="border-top: 4px solid ${isProc ? corStatus : ppgCor}">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <span class="category-tag ${tagClass}">${categoriaTitulo.slice(0,-1)}</span>
                        <span style="font-size: 0.6rem; color: ${ppgCor}; border: 1px solid ${ppgCor}; padding: 1px 6px; border-radius: 4px; font-weight: bold;">${ppgOriginal.toUpperCase()}</span>
                    </div>
                    <h3 style="margin: 10px 0; font-size: 1.1rem;">${item.titulo}</h3>
                    <p style="font-size: 0.85rem; color: var(--text-dim); flex-grow: 1;">${item.descricao}</p>
                    ${isProc ? `<div style="font-size: 0.65rem; font-weight: bold; color: ${corStatus}; margin: 10px 0;">● ${item.status.toUpperCase()}</div>` : ''}
                    ${keywordsHtml}
                    <a href="${item.link}" class="btn-view" target="_blank" style="border-color: ${ppgCor}; color: ${ppgCor};">ABRIR</a>
                </div>
            `;
        }).join('');
    }

    async function carregarDados() {
        const container = document.getElementById('content-area');
        const ppgSelect = document.getElementById('ppgFilter');
        const ppgsEncontrados = new Set();
        container.innerHTML = '<p style="text-align:center; padding: 50px;">Carregando...</p>';
        let fullHtml = '';

        for (const sec of secoes) {
            try {
                const response = await fetch(sec.arquivo);
                if (!response.ok) continue;
                const dados = await response.json();
                dados.forEach(item => { 
                    if(item.ppg && item.ppg.toLowerCase() !== 'geral') ppgsEncontrados.add(item.ppg.trim().toLowerCase());
                });

                let conteudo = `<div class="grid-container">${renderCards(dados, sec.tagClass, sec.titulo)}</div>`;
                if (sec.id === 'processo') {
                    const ativos = dados.filter(i => i.status === 'ativo');
                    const inativos = dados.filter(i => i.status === 'inativo');
                    conteudo = `<div class="grid-container">${renderCards(ativos, sec.tagClass, sec.titulo)}</div>
                                <h4 style="color: var(--text-dim); margin-top: 30px;">○ ARQUIVADOS</h4>
                                <div class="grid-container" style="opacity: 0.6;">${renderCards(inativos, sec.tagClass, sec.titulo)}</div>`;
                }
                fullHtml += `<div class="section-block" id="sec-${sec.id}"><h2 style="color: var(--accent); font-size: 1rem; text-transform: uppercase; margin: 40px 0 20px;">${sec.titulo}</h2>${conteudo}</div>`;
            } catch (e) { console.error(e); }
        }

        const currentVal = ppgSelect.value;
        ppgSelect.innerHTML = '<option value="all">Todos os PPGs</option>';
        Array.from(ppgsEncontrados).sort().forEach(p => ppgSelect.innerHTML += `<option value="${p}">${p.toUpperCase()}</option>`);
        ppgSelect.value = currentVal;
        container.innerHTML = fullHtml;
        filter();
    }

    function setCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
        document.getElementById('btn-' + cat).classList.add('active');
        maybeCloseMenu();
        filter();
    }

    function filter() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const selPPG = document.getElementById('ppgFilter').value.toLowerCase();
        const sections = document.querySelectorAll('.section-block');
        sections.forEach(section => {
            const sectionId = section.id.replace('sec-', '');
            const cards = section.querySelectorAll('.card');
            let hasVisible = false;
            if (currentCategory === 'all' || currentCategory === sectionId) {
                cards.forEach(card => {
                    const cardPPG = (card.getAttribute('data-ppg') || '').toLowerCase();
                    const txt = card.innerText.toLowerCase();
                    const matchesPPG = (selPPG === 'all' || cardPPG === selPPG || cardPPG === 'geral');
                    const matchesSearch = txt.includes(val);
                    if (matchesPPG && matchesSearch) { card.style.display = ""; hasVisible = true; } 
                    else { card.style.display = "none"; }
                });
                section.style.display = hasVisible ? "" : "none";
            } else { section.style.display = "none"; }
        });
        updateFilterBadges();
    }

    carregarDados();
</script>

</body>
</html>
