<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPGE Flows - Unifesp</title>
    <style>
        /* Estilos da Tela de Login */
        #loginOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex; /* O Firebase controlará isso */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 9999;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: #2d2d2d;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }

        .login-card h2 { margin-bottom: 20px; color: #4dabf7; }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 6px;
            border: 1px solid #444;
            background: #3d3d3d;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #228be6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover { background: #1c7ed6; }

        #errorMsg {
            color: #ff6b6b;
            font-size: 0.9em;
            margin-top: 10px;
            display: none;
        }

        /* Área do Conteúdo (Fluxogramas) */
        body { font-family: sans-serif; background: #f8f9fa; }
        .main-content { padding: 40px; max-width: 1000px; margin: 0 auto; }
        .logout-btn {
            position: fixed;
            top: 20px; right: 20px;
            width: auto; padding: 8px 15px;
            background: #fa5252;
        }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-card">
            <h2>PPGE Flows</h2>
            <p>Insira a chave de acesso</p>
            <input type="password" id="passInput" placeholder="Senha">
            <button onclick="checkPass()">Aceder</button>
            <p id="errorMsg"></p>
        </div>
    </div>

    <div class="main-content">
        <button class="logout-btn" onclick="logout()">Sair</button>
        <h1>Fluxogramas do Programa</h1>
        <hr>
        <div id="fluxo-container">
            <p>O conteúdo dos fluxogramas será carregado aqui após a autenticação.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // A sua CONST que você gerou
        const firebaseConfig = {
            apiKey: "AIzaSyAlH7V0HX8qjt9fk70-5dz5benTFsAc8Rk",
            authDomain: "ppge-flows.firebaseapp.com",
            projectId: "ppge-flows",
            storageBucket: "ppge-flows.firebasestorage.app",
            messagingSenderId: "617698776322",
            appId: "1:617698776322:web:a6fe8feb21b97684a59e1b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Função de Login
        window.checkPass = function() {
            const password = document.getElementById('passInput').value;
            const email = "admin@ppge.com"; // Certifique-se que este e-mail existe no console!
            const errorMsg = document.getElementById('errorMsg');

            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    console.log("Acesso autorizado");
                    errorMsg.style.display = 'none';
                })
                .catch((error) => {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = "Chave de acesso inválida.";
                });
        };

        // Função de Sair
        window.logout = function() {
            signOut(auth);
        };

        // Monitor de Estado (Segurança em Tempo Real)
        onAuthStateChanged(auth, (user) => {
            const overlay = document.getElementById('loginOverlay');
            if (user) {
                overlay.style.display = 'none'; // Desbloqueia o site
            } else {
                overlay.style.display = 'flex'; // Bloqueia o site
            }
        });
    </script>
</body>
</html>
